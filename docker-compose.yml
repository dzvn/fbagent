services:
  postgres:
    image: postgres:15-alpine
    container_name: fbagent-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: fbagent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: fbagent-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fbagent-backend
    restart: unless-stopped
    ports:
      - "9001:9000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres123@postgres:5432/fbagent
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fbagent-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://localhost:9001
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fbagent-worker
    restart: unless-stopped
    command: ["bun", "run", "src/worker.ts"]
    environment:
      NODE_ENV: development
      DATABASE_URL: postgres://postgres:postgres123@postgres:5432/fbagent
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules

volumes:
  postgres_data:
